version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React
  - Vite
  - Vanilla CSS
  - Framer Motion
  - Recharts
routes:
  - path: /
    file: src/App.tsx
    auth_required: false
    description: Main application page with role-based login
features:
  - name: Role-Based Login
    description: Authenticate using predefined profiles (QSMS, WFG, FINANCE) and PINs
    files:
      - src/components/Login.tsx
      - src/services/auth.ts
    entry_route: /
    user_interactions:
      - Select user profile from dropdown
      - Enter 6-digit PIN
      - Click Login button
    api_calls:
      - method: POST
        endpoint: https://script.google.com/macros/s/AKfycbzECrJpWg8d8CgaCdg3f1fFymsPulMLBv82vJctEAXmYvNXSG0DGWsZU8bGXwIOmNJ_/exec
    auth_required: false
  - name: RBAC Tab Navigation
    description: Conditional visibility of tabs based on user role
    files:
      - src/components/MainLayout.tsx
    entry_route: /
    user_interactions:
      - Click on tabs (Overall, Add Case, Dashboard)
    auth_required: true
  - name: Case Management
    description: Create and view rework cases
    files:
      - src/components/AddCaseTab.tsx
      - src/components/OverallTab.tsx
    entry_route: /
    user_interactions:
      - Fill case details
      - Click Submit
    auth_required: true
known_limitations:
  - issue: Backend relies on Google Apps Script properties which are not visible in codebase
    location: gas/Code.gs
    impact: Hard to verify credentials without external confirmation
