version: "2"
type: frontend
tech_stack:
  - language: TypeScript
  - framework: React
  - ui_library: Tailwind CSS
  - other: Vite
routes:
  - path: /
    file: src/App.tsx
    auth_required: true
    description: Main app shell and authenticated dashboard with tabbed case management
features:
  - name: User Login
    description: Authenticate user with PIN/username via Google Apps Script backend
    files:
      - src/components/Login.tsx
      - src/services/auth.ts
      - src/App.tsx
    entry_route: /
    user_interactions:
      - Enter username
      - Enter password
      - Click login button
      - See error message on invalid credentials
    api_calls:
      - method: POST
        endpoint: /exec?action=loginWithPassword
    auth_required: false

  - name: Create Rework Case
    description: Record a new rework case with item details, optional image uploads, and source metadata.
    files:
      - src/components/AddCaseTab.tsx
      - src/components/ImageUpload.tsx
      - src/services/api.ts
      - src/App.tsx
    entry_route: /
    user_interactions:
      - Select case source
      - Enter item number and check existing master data
      - Enter item name, code, amount, reason, and responsible party
      - Upload images for the item
      - Submit the new case
      - Verify success or error notification
    api_calls:
      - method: POST
        endpoint: /exec?action=insert
    auth_required: true

  - name: View and Manage Cases
    description: Load, review, edit, and delete existing rework cases within the dashboard.
    files:
      - src/components/OverallTab.tsx
      - src/components/Dashboard.tsx
      - src/components/UpdateModal.tsx
      - src/services/api.ts
      - src/App.tsx
    entry_route: /
    user_interactions:
      - View case list and dashboard metrics
      - Open a case edit modal
      - Update case details
      - Delete a case
    api_calls:
      - method: POST
        endpoint: /exec?action=fetchAllCases
      - method: POST
        endpoint: /exec?action=update
      - method: POST
        endpoint: /exec?action=delete
    auth_required: true

  - name: Item Master Lookup
    description: Auto-fill item name from master data and optionally persist new item metadata in the item master.
    files:
      - src/App.tsx
      - src/services/api.ts
      - src/components/AddCaseTab.tsx
    entry_route: /
    user_interactions:
      - Enter item number
      - Click check button
      - Confirm saving new item when not found
    api_calls:
      - method: POST
        endpoint: /exec?action=fetchItemMaster
      - method: POST
        endpoint: /exec?action=saveItemToMaster
    auth_required: true
known_limitations:
  - issue: App uses a single-page tabbed UI without explicit router routes
    location: src/App.tsx
    impact: Tests should treat the app as a single route with internal tab navigation
  - issue: Backend depends on REACT_APP_GAS_WEB_APP_URL and Google Apps Script CORS support
    location: src/services/api.ts
    impact: E2E tests may fail if GAS URL is not configured or backend does not allow CORS
  - issue: Login flow requires GAS backend credentials and valid test account
    location: src/services/auth.ts
    impact: Automated tests need valid PIN/profile values for authentication
